function Name({children}) {
  if (!children) return null;
  const parts=[]; let rem=String(children);
  const names=Object.keys(nameRoleMap).sort((a,b)=>b.length-a.length);
  let idx=0;
  while (rem.length>0) {
    let found=false;
    for (const name of names) {
      if (rem.startsWith(name)) {
        const c=roleColors[nameRoleMap[name]];
        parts.push(<span key={idx++} style={{color:c.text,fontWeight:600}}>{name}</span>);
        rem=rem.slice(name.length); found=true; break;
      }
    }
    if (!found) { let next=rem.length; for (const name of names) { const i=rem.indexOf(name); if(i>0&&i<next) next=i; } parts.push(<span key={idx++}>{rem.slice(0,next)}</span>); rem=rem.slice(next); }
  }
  return <span>{parts}</span>;
}

          {selData.exp_detail.length>0?<div className="space-y-1">{selData.exp_detail.sort((a,b)=>b.amt-a.amt).map((r,i)=><div key={i} className="flex justify-between text-xs items-center"><span className="text-slate-300">{r.item}</span><div className="flex items-center gap-2"><div className="w-20 h-1.5 bg-slate-800 rounded-full overflow-hidden"><div className="h-full bg-red-500 rounded-full" style={{width:Math.min(100,r.amt/selData.expenses*100*3)+'%'}}/></div><span className="text-red-400 font-mono w-16 text-right">{fmt(r.amt)}</span></div></div>)}</div>:<p className="text-xs text-slate-500 italic">Detailed breakdown not available for this year</p>}
        </div>
      </div>:selYear?<p className="text-xs text-slate-500 italic mt-2 text-center">Detailed breakdown not available for {selYear}. Data available for 2017, 2018, 2019, and 2024.</p>:null}
    </Sec>
    <Sec title="Spending by Category \u2014 Key Years" sub="Where the money went (years with detailed data)">
      <div className="overflow-x-auto"><table className="w-full text-xs"><thead><tr className="border-b border-slate-700"><th className="text-left py-2 px-2 text-slate-400">Category</th>
        {["2017","2018","2019","2024"].map(y=><th key={y} className="text-right py-2 px-2 text-slate-400">{y}</th>)}
        <th className="text-right py-2 px-2 text-slate-400">Flag</th>
      </tr></thead><tbody>
        {categories.map((cat,i)=>{
          const vals=["2017","2018","2019","2024"].map(y=>{const sd=spendingData.find(d=>d.year===y);const item=sd?sd.exp_detail.find(e=>e.item.includes(cat.split("/")[0])):null;return item?item.amt:null;});
          const maxVal=Math.max(...vals.filter(v=>v!==null));
          const flag=cat==="Insurance"?"⚠️ 535% increase":cat==="Water/Sewer"?"⚠️ 3× spike 2019":null;
          return <tr key={i} className="border-b border-slate-800 hover:bg-slate-800/30"><td className="py-2 px-2 text-white font-medium"><span className="inline-block w-2 h-2 rounded-full mr-2" style={{background:catColors[cat]||"#64748b"}}/>{cat}</td>
            {vals.map((v,j)=><td key={j} className={`py-2 px-2 text-right font-mono ${v===maxVal&&maxVal>0?"text-red-400 font-bold":"text-slate-400"}`}>{v?fmt(v):"\u2014"}</td>)}
            <td className="py-2 px-2 text-right text-amber-400 text-xs">{flag||""}</td>
          </tr>;
        })}
        <tr className="border-t-2 border-slate-600"><td className="py-2 px-2 text-white font-bold">TOTAL EXPENSES</td>
          {["2017","2018","2019","2024"].map(y=>{const sd=spendingData.find(d=>d.year===y);return <td key={y} className="py-2 px-2 text-right text-white font-bold font-mono">{sd?fmt(sd.expenses):"\u2014"}</td>;})}
          <td></td>
        </tr>
      </tbody></table></div>
      <Q>2019 is the outlier year: $53K Alvic self-pay + $48K water anomaly = $101K in two line items. Remove those and 2019 expenses are normal ($65K). The spike was manufactured.</Q>
    </Sec>
    <Sec title="Insurance Premium Trend" sub="Bedshore (red area) vs Market Comparable (dashed blue). 535% increase.">
      <ResponsiveContainer width="100%" height={260}><ComposedChart data={insuranceData}><CartesianGrid strokeDasharray="3 3" stroke="#334155"/><XAxis dataKey="year" stroke="#94a3b8" fontSize={11}/><YAxis stroke="#94a3b8" fontSize={10} tickFormatter={v=>`$${(v/1000).toFixed(0)}K`}/><Tooltip content={<ChartTip/>}/><Area dataKey="bedshore" name="Bedshore" fill="#dc262640" stroke="#dc2626" strokeWidth={2}/><Line dataKey="comp" name="Market Comp" stroke="#3b82f6" strokeWidth={2} strokeDasharray="5 5" dot={false}/></ComposedChart></ResponsiveContainer>
      <p className="text-xs text-red-400 mt-2"><strong>{fmt(insOver)}</strong> in excess premiums. Open ECB violation is the primary driver.</p>
    </Sec>
    <Sec title="Net Cash Flow by Year" sub="Negative every year since 2020">
      <div className="grid grid-cols-3 md:grid-cols-9 gap-2">{bankData.map((d,i)=><div key={i} className={`rounded-lg p-2 text-center ${d.net>=0?"bg-green-950/30 border border-green-900":"bg-red-950/30 border border-red-900"}`}><p className="text-xs text-slate-400">{d.year}</p><p className={`text-sm font-bold ${d.net>=0?"text-green-400":"text-red-400"}`}>{fmt(d.net)}</p></div>)}</div>
    </Sec>
  </div>;
}

          <a href="https://iapps.courts.state.ny.us/nyscef/DocumentList?docketId=c9hKSncsngJn3mtS/spTYg==" target="_blank" className="text-xs text-teal-500 hover:text-teal-400 underline">Levin v Kitsis (NYSCEF)</a>
